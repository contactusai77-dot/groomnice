<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Book Your Grooming Appointment</title>
    <meta name="theme-color" content="#7c3aed" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<pre style="padding:20px;color:red;font-family:monospace">' +
          'JS ERROR: ' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack || '') + '</pre>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
